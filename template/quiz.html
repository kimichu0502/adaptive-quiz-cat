<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MiniCAT Quiz</title>
</head>
<body>
    <h1>MiniCAT Quiz</h1>
    <p>Question {{ question_number }} of {{ max_questions }}</p>
    <p>Current estimated ability: {{ ability }}</p>

    <form method="POST" action="/quiz">
        <input type="hidden" name="question_id" value="{{ question.id }}">

        <h3>{{ question.text }}</h3>

        {% for choice in question.choices %}
            <div>
                <label>
                    <input type="radio" name="answer" value="{{ choice }}" required>
                    {{ choice }}
                </label>
            </div>
        {% endfor %}

        <br>
        <button type="submit">Submit</button>
    </form>
</body>
</html>
