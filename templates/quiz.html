<!DOCTYPE html>
<html>
<head>
    <title>MiniCAT Quiz</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

<h1>MiniCAT Quiz</h1>

<p>Question {{ question_number }} of {{ max_questions }}</p>
<p>Estimated ability: {{ ability }}</p>

<form method="POST">

<h3>{{ question.text }}</h3>

{% for choice in question.choices %}
<div class="choice">
    <label>
        <input type="radio" name="answer" value="{{ choice }}" required>
        <span>{{ choice }}</span>
    </label>
</div>
{% endfor %}

<input type="hidden" name="question_id" value="{{ question.id }}">

<br><br>

<button type="submit">Submit Answer</button>

</form>

</div>

</body>
</html>
